name: Windows App Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Dependencies installieren
        run: flutter pub get

      - name: Code-Generator ausführen (Drift + Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Windows App bauen (Debug)
        run: flutter build windows --debug

      - name: App zippen
        shell: pwsh
        run: |
          # Build-Ausgabeordner robust ermitteln (x64-Unterordner je nach Flutter-Version)
          $dir = Get-ChildItem -Path build/windows -Recurse -Directory `
                 | Where-Object { $_.FullName -match 'runner[\\/]+Debug$' } `
                 | Select-Object -First 1
          if (-not $dir) { throw "Debug-Ausgabeordner nicht gefunden" }
          Write-Host "Packe $($dir.FullName)"
          Compress-Archive -Path "$($dir.FullName)/*" -DestinationPath MindFeed-Windows.zip -Force

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: MindFeed-Windows-debug
          path: MindFeed-Windows.zip
          retention-days: 14
