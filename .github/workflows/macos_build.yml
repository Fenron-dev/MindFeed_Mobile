name: macOS App Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Dependencies installieren
        run: flutter pub get

      - name: Code-Generator ausführen (Drift + Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: macOS App bauen (Debug, ad-hoc signiert)
        run: |
          flutter build macos --debug \
            -- CODE_SIGN_IDENTITY="-" \
               CODE_SIGNING_REQUIRED=NO \
               CODE_SIGNING_ALLOWED=YES

      - name: App zippen
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APP_DIR="build/macos/Build/Products/Debug"
          ZIP_NAME="MindFeed-macOS-debug-${SHORT_SHA}.zip"
          cd "$APP_DIR"
          zip -r --symlinks "../../../${ZIP_NAME}" "mindfeed_mobile.app"
          cd -
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Quarantine-Flag entfernen (für einfacheres Öffnen)
        run: |
          xattr -dr com.apple.quarantine "build/${ZIP_NAME}" 2>/dev/null || true

      - name: GitHub Release aktualisieren (latest-debug)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "Latest Debug Build"
          prerelease: true
          body: |
            Automatischer Debug-Build vom ${{ github.event.head_commit.timestamp || 'letzten Push' }}
            Commit: `${{ github.sha }}`

            ## Android
            - APK herunterladen → auf Gerät installieren
            - Einstellungen → Unbekannte Quellen erlauben

            ## macOS
            - ZIP herunterladen und entpacken
            - Beim ersten Start: Rechtsklick → Öffnen (Gatekeeper-Bypass)
            - Oder im Terminal: `xattr -dr com.apple.quarantine MindFeed.app`
          files: build/${{ env.ZIP_NAME }}
