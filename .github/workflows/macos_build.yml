name: macOS App Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Dependencies installieren
        run: flutter pub get

      - name: Code-Generator ausführen (Drift + Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Flutter Workspace vorbereiten (pod install + Flutter-Artefakte)
        run: flutter build macos --config-only

      - name: macOS App bauen via xcodebuild
        run: |
          cd macos
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SYMROOT="$PWD/../build/macos/Build/Products" \
            OBJROOT="$PWD/../build/macos/Build/Intermediates"

      - name: Ad-hoc Signierung (verhindert "beschädigt"-Fehler auf macOS)
        run: |
          codesign --force --deep --sign - \
            build/macos/Build/Products/Debug/mindfeed_mobile.app

      - name: App zippen + Quarantine-Flag entfernen
        run: |
          APP="build/macos/Build/Products/Debug/mindfeed_mobile.app"
          xattr -cr "$APP"
          cd build/macos/Build/Products/Debug
          zip -r --symlinks MindFeed-macOS.zip mindfeed_mobile.app

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: MindFeed-macOS-debug
          path: build/macos/Build/Products/Debug/MindFeed-macOS.zip
          retention-days: 14
