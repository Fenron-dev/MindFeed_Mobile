name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # Nötig für gh release create

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17 setup
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Dependencies installieren
        run: flutter pub get

      - name: Code-Generator ausführen (Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: APK bauen (Debug)
        run: flutter build apk --debug --target-platform android-arm64

      - name: APK umbenennen
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/mindfeed-debug-${SHORT_SHA}.apk
          echo "APK_NAME=mindfeed-debug-${SHORT_SHA}.apk" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: GitHub Release aktualisieren (latest-debug)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "Latest Debug Build"
          prerelease: true
          body: |
            Automatischer Debug-Build vom ${{ github.event.head_commit.timestamp || 'letzten Push' }}
            Commit: `${{ github.sha }}`

            **Installation:**
            1. APK herunterladen
            2. Android: Einstellungen → Unbekannte Quellen erlauben
            3. APK tippen und installieren
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
